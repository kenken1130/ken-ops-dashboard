function genSched(tasks,routines){
  const td=tS(),dow=new Date().getDay();
  const cands=tasks.filter(t=>t.status!=="Done").sort((a,b)=>{const pa=gPr(a.priority).sort,pb=gPr(b.priority).sort;if(pa!==pb)return pa-pb;if(a.deadline&&b.deadline)return a.deadline.localeCompare(b.deadline);if(a.deadline)return -1;if(b.deadline)return 1;return 0});
  const od=cands.filter(t=>t.deadline&&t.deadline<=td),rs=cands.filter(t=>!t.deadline||t.deadline>td);
  const sorted=[...od,...rs].slice(0,5);
  const tR=routines.filter(r=>r.freq==="daily"||(r.freq==="weekly_mon"&&dow===1));
  const blk=[{start:720,end:780,title:"Lunch"}];
  const eS={morning:{s:540,e:720},afternoon:{s:780,e:1020},evening:{s:1020,e:1260}};
  function findSlot(dur,pref,after=540){
    const p=pref&&pref!=="any"?eS[pref]:null;
    for(let pass=0;pass<2;pass++){
      let cur=pass===0?(p?Math.max(p.s,after):Math.max(540,after)):Math.max(540,after);
      let end=pass===0?(p?p.e:1260):1260;
      while(cur+dur<=end){
        if(cur<780&&cur+dur>720){cur=780;continue}
        let cf=false;for(const b of blk)if(cur<b.end&&cur+dur>b.start){cur=b.end+15;cf=true;break}
        if(!cf)return cur;
      }
    }
    return null;
  }
  const sched=[];
  for(const r of tR){const[h,m]=r.time.split(":").map(Number);const s=h*60+m;sched.push({type:"routine",title:r.title,start:s,end:s+r.est,pts:r.pts,project:r.project,color:"#78909C"});blk.push({start:s,end:s+r.est,title:r.title})}
  for(const t of sorted){const est=t.est_minutes||gPr(t.priority).est;const sl=findSlot(est,t.preferred_time);if(!sl)continue;const p=gP(t.project);sched.push({type:"task",id:t.id,title:t.title,start:sl,end:sl+est,pts:gPr(t.priority).pts,priority:t.priority,project:t.project,color:p.color,emoji:gPr(t.priority).emoji});blk.push({start:sl,end:sl+est,title:t.title})}
  sched.sort((a,b)=>a.start-b.start);
  return{schedule:sched,totalPts:sched.reduce((s,b)=>s+(b.pts||0),0)};
}

const KAI_SETTINGS_KEY="ken-ops-kai";
function getKaiSettings(){try{const v=localStorage.getItem(KAI_SETTINGS_KEY);return v?JSON.parse(v):null}catch{return null}}
function saveKaiSettings(s){localStorage.setItem(KAI_SETTINGS_KEY,JSON.stringify(s))}

async function askKai(message){
  const s=getKaiSettings();
  if(!s||!s.url||!s.token)return null;
  try{
    const res=await fetch(s.url+"/v1/responses",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+s.token},
      body:JSON.stringify({model:"openclaw",input:message,user:"ken-ops"})
    });
    if(!res.ok)throw new Error("Kai API error: "+res.status);
    const data=await res.json();
    const out=data.output;
    if(out&&out.length>0&&out[0].content&&out[0].content.length>0){return out[0].content[0].text}
    return null;
  }catch(e){console.error("Kai error:",e);return null}
}

        <div style={{display:"flex",gap:"2px"}}>
          {[{id:"schedule",l:"⏰"},{id:"dashboard",l:"📋"},{id:"focus",l:"🎯"},{id:"gantt",l:"📅"},{id:"growth",l:"🚀"}].map(v=>(<button key={v.id} onClick={()=>v.id==="focus"?sf():setView(v.id)} style={{padding:"6px 10px",border:"none",borderRadius:"8px",background:view===v.id?"#1e1e3a":"transparent",color:view===v.id?"#fff":"#555",fontSize:"15px",cursor:"pointer"}}>{v.l}</button>))}

        const r=await askKai(msg);if(r)setKaiBriefing(r);setKaiLoading(false);

      {view==="kanban"&&<KanV sts={STATUSES} flt={flt} srt={srt} drop={(e,s)=>{e.preventDefault();if(dt){upd(dt.id,{status:s});setDt(null)}}} ds={(e,t)=>{setDt(t);e.dataTransfer.effectAllowed="move"}} upd={upd} edit={setEt}/>}

  </div>);
}

// ─── SCHEDULE VIEW ─────────────────────────────────────────────
function SchedView({sch,sa,approve,comp,focus,gs,kaiBriefing,kaiLoading,kaiConnected,onKaiSettings,fetchBriefing}){

  const now=new Date(),curMin=now.getHours()*60+now.getMinutes();
  const briefingRef=useRef(false);
  useEffect(()=>{if(!briefingRef.current&&kaiConnected&&!kaiBriefing&&!kaiLoading){briefingRef.current=true;fetchBriefing()}},[kaiConnected]);

  if(!sa)return(<div>
    <div style={{background:"#111122",borderRadius:"14px",padding:"20px",marginBottom:"16px",border:"1px solid #1a1a2e"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <span style={{fontSize:"18px"}}>🤖</span><span style={{fontSize:"13px",fontWeight:600,color:"#00B8D4"}}>Kai</span><span style={{fontSize:"10px",color:"#444"}}>Morning briefing</span>
        </div>
        <button onClick={onKaiSettings} style={{padding:"3px 8px",border:"1px solid #1e1e3a",borderRadius:"4px",background:"transparent",color:kaiConnected?"#00B8D4":"#555",fontSize:"9px",cursor:"pointer",fontFamily:"inherit"}}>{kaiConnected?"⚡ 接続中":"⚙️ Kai設定"}</button>
      </div>
      {kaiLoading?<div style={{fontSize:"13px",color:"#00B8D4",marginBottom:"16px"}}>🤖 Kaiが考え中...</div>
      :<div style={{fontSize:"14px",color:"#ddd",lineHeight:1.8,marginBottom:"16px",whiteSpace:"pre-wrap"}}>{kaiBriefing||"おはよう、Ken。今日のミッション組んだよ。"}</div>}
      {blocks.map((b,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",marginBottom:"4px",borderRadius:"8px",background:`${b.color}10`,borderLeft:`3px solid ${b.color}`}}>
        <span style={{fontSize:"12px",color:"#888",fontFamily:"JetBrains Mono",width:"45px",flexShrink:0}}>{fm(b.start)}</span>
        <span style={{fontSize:"12px",color:"#ddd",flex:1}}>{b.type==="routine"?"🔄 ":(b.emoji||"")+" "}{b.title}</span>
        <span style={{fontSize:"10px",color:"#555",fontFamily:"JetBrains Mono"}}>{b.end-b.start}min</span>
        <span style={{fontSize:"10px",color:"#7B68EE",fontFamily:"JetBrains Mono"}}>+{b.pts}pt</span>
      </div>))}
      <div style={{marginTop:"16px",padding:"12px",background:"#0d0d18",borderRadius:"10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:"11px",color:"#666"}}>全クリアで</div><div style={{fontSize:"20px",fontWeight:700,color:"#FF6B35",fontFamily:"JetBrains Mono"}}>{totalPts+50}pt</div><div style={{fontSize:"9px",color:"#555"}}>({totalPts} + ボーナス50)</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:"11px",color:"#666"}}>ストリーク</div><div style={{fontSize:"18px",fontWeight:700,color:"#FF6B35"}}>🔥 {gs.streak+1}日目</div></div>
      </div>
    </div>
    <button onClick={approve} style={{width:"100%",padding:"18px",border:"none",borderRadius:"14px",background:"linear-gradient(135deg,#2EC4B6,#00B8D4)",color:"#fff",fontSize:"17px",fontWeight:700,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 20px #2EC4B644",marginBottom:"10px"}}>OK、これで行く 👍</button>
    <button onClick={()=>{approve();const t=blocks.find(x=>x.type==="task");if(t)focus(t.id)}} style={{width:"100%",padding:"14px",border:"1px solid #E040FB33",borderRadius:"12px",background:"#E040FB10",color:"#E040FB",fontSize:"14px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>⚡ 考えるな、最初のタスクから始める</button>
  </div>);

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"14px"}}><span style={{fontSize:"14px",fontWeight:600,color:"#fff"}}>⏰ 今日のスケジュール</span><span style={{fontSize:"11px",color:"#7B68EE",fontFamily:"JetBrains Mono"}}>Max {totalPts+50}pt</span></div>
    {blocks.map((b,i)=>{
      const past=curMin>b.end,cur=curMin>=b.start&&curMin<=b.end,prg=cur?((curMin-b.start)/(b.end-b.start))*100:past?100:0;
      return(<div key={i} style={{marginBottom:"6px",opacity:past?.5:1}}>

          <div style={{flex:1,position:"relative"}}>
            <div style={{fontSize:"13px",color:past?"#555":"#ddd",textDecoration:past?"line-through":"none"}}>{b.type==="routine"?"🔄 ":""}{b.title}</div>
            <div style={{display:"flex",gap:"6px",marginTop:"3px",alignItems:"center"}}>

              <span style={{fontSize:"9px",color:"#555",fontFamily:"JetBrains Mono"}}>{b.end-b.start}min</span>
              <span style={{fontSize:"9px",color:"#7B68EE",fontFamily:"JetBrains Mono"}}>+{b.pts}pt</span>
            </div>
          </div>
          {b.type==="task"&&!past&&<div style={{display:"flex",gap:"6px",position:"relative"}}>
            <button onClick={()=>focus(b.id)} style={{padding:"8px 12px",border:"none",borderRadius:"8px",background:"#7B68EE25",color:"#7B68EE",fontSize:"14px",cursor:"pointer",fontFamily:"inherit"}}>🎯</button>
            <button onClick={()=>comp(b.id)} style={{padding:"8px 12px",border:"none",borderRadius:"8px",background:"#66BB6A25",color:"#66BB6A",fontSize:"14px",cursor:"pointer",fontFamily:"inherit"}}>✅</button>
          </div>}
        </div>
      </div>)
    })}
    <div style={{marginTop:"20px",display:"flex",gap:"8px"}}>
      <button onClick={()=>{const t=blocks.find(x=>x.type==="task"&&curMin<=x.end);if(t)focus(t.id)}} style={{flex:1,padding:"16px",border:"none",borderRadius:"12px",background:"linear-gradient(135deg,#E040FB,#7B68EE)",color:"#fff",fontSize:"15px",fontWeight:700,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 16px #E040FB33"}}>⚡ 10分だけやる</button>
      <button onClick={()=>setSa(false)} style={{padding:"16px 20px",border:"1px solid #333",borderRadius:"12px",background:"transparent",color:"#888",fontSize:"13px",cursor:"pointer",fontFamily:"inherit"}}>🔄</button>
    </div>
  </div>);
}

// ─── CELEBRATION ───────────────────────────────────────────────
function Cel({pts,task}){const[ps]=useState(()=>Array.from({length:25},(_,i)=>({id:i,x:50+(Math.random()-.5)*40,y:50,dx:(Math.random()-.5)*4,dy:-2-Math.random()*3,c:["#FF6B35","#7B68EE","#2EC4B6","#E71D36","#FFD700","#66BB6A"][i%6],s:4+Math.random()*6})));return(<div style={{position:"fixed",inset:0,zIndex:9999,pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)"}}/>{ps.map(p=><div key={p.id} style={{position:"absolute",width:p.s,height:p.s,borderRadius:"50%",background:p.c,left:`${p.x}%`,top:`${p.y}%`,animation:`c${p.id} 2s ease-out forwards`}}/>)}<style>{ps.map(p=>`@keyframes c${p.id}{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(${p.dx*80}px,${p.dy*60+200}px) scale(.3);opacity:0}}`).join("")}</style><div style={{position:"relative",zIndex:1,textAlign:"center",animation:"pop .4s ease-out"}}><div style={{fontSize:"44px",marginBottom:"6px"}}>🎉</div><div style={{fontSize:"26px",fontWeight:700,color:"#FFD700",fontFamily:"JetBrains Mono"}}>+{pts} OPS</div><div style={{fontSize:"13px",color:"#ddd",marginTop:"4px"}}>{task.title}</div></div><style>{`@keyframes pop{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}`}</style></div>)}

// ─── FOCUS MODE ────────────────────────────────────────────────
function FocusMode({task,lv,gs,comp,skip,exit}){const[tm,setTm]=useState(25*60),[rn,setRn]=useState(false),[md,setMd]=useState(25);const ref=useRef(null);const p=gP(task.project),pr=gPr(task.priority);
  useEffect(()=>{setTm(md*60);setRn(false)},[md]);useEffect(()=>{if(rn&&tm>0)ref.current=setInterval(()=>setTm(p=>p-1),1000);else clearInterval(ref.current);return()=>clearInterval(ref.current)},[rn,tm]);
  const m=Math.floor(tm/60),s=tm%60,pct=((md*60-tm)/(md*60))*100;
  return(<div style={{minHeight:"100vh",background:"#0a0a0f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP','JetBrains Mono',sans-serif",padding:"20px"}}>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <button onClick={exit} style={{position:"fixed",top:"14px",left:"14px",background:"none",border:"none",color:"#555",fontSize:"13px",cursor:"pointer",fontFamily:"inherit"}}>← 戻る</button>
    <div style={{fontSize:"10px",color:"#555",marginBottom:"6px"}}>🎯 フォーカスモード</div>
    <div style={{fontSize:"10px",color:p.color,marginBottom:"20px"}}>{p.emoji} {p.name} · {pr.emoji}</div>
    <div style={{fontSize:"18px",fontWeight:700,color:"#fff",textAlign:"center",marginBottom:"28px",maxWidth:"360px",lineHeight:1.4}}>{task.title}</div>
    <div style={{position:"relative",width:"180px",height:"180px",marginBottom:"20px"}}><svg width="180" height="180" viewBox="0 0 180 180"><circle cx="90" cy="90" r="80" fill="none" stroke="#1a1a2e" strokeWidth="5"/><circle cx="90" cy="90" r="80" fill="none" stroke={p.color} strokeWidth="5" strokeDasharray={`${2*Math.PI*80}`} strokeDashoffset={`${2*Math.PI*80*(1-pct/100)}`} strokeLinecap="round" transform="rotate(-90 90 90)" style={{transition:"stroke-dashoffset 1s"}}/></svg><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:"36px",fontWeight:700,color:"#fff",fontFamily:"JetBrains Mono"}}>{String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}</div></div></div>
    <div style={{display:"flex",gap:"6px",marginBottom:"14px"}}>{[10,15,25].map(n=><button key={n} onClick={()=>setMd(n)} style={{padding:"5px 14px",border:md===n?`1px solid ${p.color}`:"1px solid #1e1e3a",borderRadius:"18px",background:md===n?`${p.color}20`:"transparent",color:md===n?p.color:"#555",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>{n}分</button>)}</div>
    <button onClick={()=>setRn(!rn)} style={{padding:"12px 36px",border:"none",borderRadius:"10px",background:rn?"#333":p.color,color:"#fff",fontSize:"14px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:"24px"}}>{rn?"⏸ 一時停止":"▶ スタート"}</button>
    <div style={{display:"flex",gap:"10px"}}><button onClick={comp} style={{padding:"8px 20px",border:"1px solid #66BB6A44",borderRadius:"8px",background:"#66BB6A20",color:"#66BB6A",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>✅ 完了</button><button onClick={skip} style={{padding:"8px 20px",border:"1px solid #1e1e3a",borderRadius:"8px",background:"transparent",color:"#555",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>⏭ スキップ</button></div>
  </div>);
}

// ─── DASHBOARD ─────────────────────────────────────────────────
function DashV({tt,ut,dit,ot,rtn,gs,upd,edit,sf,calEvts,gSignedIn,gSignIn,gSignOut,gRefresh,gLoading,gTasks=[],onDoneGTask}){const dow=new Date().getDay();const tr=rtn.filter(r=>r.freq==="daily"||(r.freq==="weekly_mon"&&dow===1));const _td=tS();const todayEvts=(calEvts||[]).filter(e=>(e.start?.dateTime||e.start?.date||"").startsWith(_td));const upcomingEvts=(calEvts||[]).filter(e=>!(e.start?.dateTime||e.start?.date||"").startsWith(_td));return(<div>

  <div style={{marginBottom:"16px"}}>

        <button onClick={gSignOut} style={{padding:"2px 6px",border:"1px solid #FF525233",borderRadius:"4px",background:"transparent",color:"#FF5252",fontSize:"9px",cursor:"pointer",fontFamily:"inherit"}}>解除</button>

    <div><FL>いつやりたい？</FL><select value={pref} onChange={e=>setPref(e.target.value)} style={iSt}><option value="any">いつでも</option><option value="morning">午前（集中系）</option><option value="afternoon">午後（軽め）</option><option value="evening">夜（クリエイティブ）</option></select></div>
    <div><FL>メモ</FL><input value={no} onChange={e=>setNo(e.target.value)} placeholder="補足" style={iSt}/></div>
    <div style={{display:"flex",gap:"6px"}}><button onClick={close} style={{flex:1,padding:"9px",border:"1px solid #1e1e3a",borderRadius:"7px",background:"transparent",color:"#888",cursor:"pointer",fontSize:"11px",fontFamily:"inherit"}}>キャンセル</button><button onClick={()=>{if(ti.trim())add({title:ti,project:pj,priority:pr,deadline:dl,note:no,status:"To Do",est_minutes:est?parseInt(est):gPr(pr).est,preferred_time:pref})}} style={{flex:1,padding:"9px",border:"none",borderRadius:"7px",background:"linear-gradient(135deg,#FF6B35,#E71D36)",color:"#fff",cursor:"pointer",fontSize:"11px",fontWeight:600,fontFamily:"inherit"}}>追加</button></div></div></MO>)}

function EditM({task:t,save,del,close}){const[ti,setTi]=useState(t.title),[pj,setPj]=useState(t.project),[pr,setPr]=useState(t.priority),[dl,setDl]=useState(t.deadline),[st,setSt]=useState(t.status),[no,setNo]=useState(t.note),[est,setEst]=useState(t.est_minutes||""),[pref,setPref]=useState(t.preferred_time||"any");
  return(<MO close={close}><h3 style={{margin:"0 0 14px",fontSize:"14px",color:"#fff"}}>✏️ 編集</h3><div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
    <div><FL>タスク名</FL><input value={ti} onChange={e=>setTi(e.target.value)} style={iSt}/></div>
    <div style={{display:"flex",gap:"6px"}}><div style={{flex:1}}><FL>プロジェクト</FL><select value={pj} onChange={e=>setPj(e.target.value)} style={iSt}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.emoji} {p.name}</option>)}</select></div><div style={{flex:1}}><FL>ステータス</FL><select value={st} onChange={e=>setSt(e.target.value)} style={iSt}>{STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select></div></div>
    <div style={{display:"flex",gap:"6px"}}><div style={{flex:1}}><FL>優先度</FL><select value={pr} onChange={e=>setPr(e.target.value)} style={iSt}>{PRIORITIES.map(p=><option key={p.id} value={p.id}>{p.emoji} {p.label}</option>)}</select></div><div style={{flex:1}}><FL>期限</FL><input type="date" value={dl} onChange={e=>setDl(e.target.value)} style={iSt}/></div></div>
    <div style={{display:"flex",gap:"6px"}}><div style={{flex:1}}><FL>見積(分)</FL><input type="number" value={est} onChange={e=>setEst(e.target.value)} style={iSt}/></div><div style={{flex:1}}><FL>いつやりたい？</FL><select value={pref} onChange={e=>setPref(e.target.value)} style={iSt}><option value="any">いつでも</option><option value="morning">午前</option><option value="afternoon">午後</option><option value="evening">夜</option></select></div></div>
    <div><FL>メモ</FL><input value={no} onChange={e=>setNo(e.target.value)} style={iSt}/></div>
    <div style={{display:"flex",gap:"6px"}}><button onClick={()=>{if(confirm("削除？"))del()}} style={{padding:"9px 12px",border:"1px solid #FF525244",borderRadius:"7px",background:"transparent",color:"#FF5252",cursor:"pointer",fontSize:"11px",fontFamily:"inherit"}}>🗑</button><button onClick={close} style={{flex:1,padding:"9px",border:"1px solid #1e1e3a",borderRadius:"7px",background:"transparent",color:"#888",cursor:"pointer",fontSize:"11px",fontFamily:"inherit"}}>閉じる</button><button onClick={()=>save({title:ti,project:pj,priority:pr,deadline:dl,status:st,note:no,est_minutes:est?parseInt(est):undefined,preferred_time:pref})} style={{flex:1,padding:"9px",border:"none",borderRadius:"7px",background:"linear-gradient(135deg,#2EC4B6,#00B8D4)",color:"#fff",cursor:"pointer",fontSize:"11px",fontWeight:600,fontFamily:"inherit"}}>保存</button></div></div></MO>)}

function RtnM({routines,save,close}){const[ls,setLs]=useState([...routines]);const[nt,setNt]=useState(""),[nf,setNf]=useState("daily"),[ntm,setNtm]=useState("09:00"),[ne,setNe]=useState(15);
  return(<MO close={close}><h3 style={{margin:"0 0 14px",fontSize:"14px",color:"#fff"}}>🔄 ルーティン</h3>
    <div style={{display:"flex",flexDirection:"column",gap:"4px",marginBottom:"14px"}}>{ls.map(r=>(<div key={r.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 8px",background:"#0d0d18",borderRadius:"5px"}}><span style={{fontSize:"11px",color:"#ddd"}}>{r.freq==="daily"?"毎日":"毎週月"} {r.time} — {r.title} ({r.est}min/+{r.pts}pt)</span><button onClick={()=>setLs(p=>p.filter(x=>x.id!==r.id))} style={{background:"none",border:"none",color:"#FF5252",cursor:"pointer",fontSize:"11px"}}>✕</button></div>))}</div>
    <div style={{display:"flex",gap:"4px",marginBottom:"10px",flexWrap:"wrap"}}><input value={nt} onChange={e=>setNt(e.target.value)} placeholder="新ルーティン" style={{...iSt,flex:1,minWidth:"100px"}}/><select value={nf} onChange={e=>setNf(e.target.value)} style={{...iSt,width:"70px"}}><option value="daily">毎日</option><option value="weekly_mon">毎週月</option></select><input type="time" value={ntm} onChange={e=>setNtm(e.target.value)} style={{...iSt,width:"70px"}}/><button onClick={()=>{if(nt.trim()){setLs(p=>[...p,{id:`r${Date.now()}`,title:nt,freq:nf,time:ntm,est:parseInt(ne)||15,pts:10,project:"self"}]);setNt("")}}} style={{padding:"6px 10px",border:"none",borderRadius:"6px",background:"#2EC4B6",color:"#fff",cursor:"pointer",fontSize:"11px",fontFamily:"inherit"}}>+</button></div>
    <div style={{display:"flex",gap:"6px"}}><button onClick={close} style={{flex:1,padding:"9px",border:"1px solid #1e1e3a",borderRadius:"7px",background:"transparent",color:"#888",cursor:"pointer",fontSize:"11px",fontFamily:"inherit"}}>キャンセル</button><button onClick={()=>{save(ls);close()}} style={{flex:1,padding:"9px",border:"none",borderRadius:"7px",background:"linear-gradient(135deg,#7B68EE,#FF6B35)",color:"#fff",cursor:"pointer",fontSize:"11px",fontWeight:600,fontFamily:"inherit"}}>保存</button></div>
  </MO>)}


function KaiSettingsModal({close,onSave,onDisconnect,connected}){
  const existing=getKaiSettings()||{};
  const[url,setUrl]=useState(existing.url||"");const[token,setToken]=useState(existing.token||"");const[testing,setTesting]=useState(false);const[result,setResult]=useState(null);
  const testConn=async()=>{if(!url||!token)return;setTesting(true);setResult(null);
    try{const res=await fetch(url+"/v1/responses",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({model:"openclaw",input:"接続テスト。一言で返して。",user:"ken-ops-test"})});
      if(!res.ok)throw new Error("HTTP "+res.status);const data=await res.json();
      if(data.output&&data.output[0]?.content?.[0]?.text){setResult({ok:true,msg:data.output[0].content[0].text})}else{setResult({ok:false,msg:"レスポンス形式エラー"})}
    }catch(e){setResult({ok:false,msg:e.message})}setTesting(false)};
  return(<MO close={close}>
    <h3 style={{margin:"0 0 14px",fontSize:"14px",color:"#fff"}}>🤖 Kai (OpenClaw) 設定</h3>
    <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
      <div><FL>トンネルURL</FL><input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxx.trycloudflare.com" style={iSt}/><div style={{fontSize:"8px",color:"#444",marginTop:"2px"}}>MacBook Proで cloudflared tunnel --url http://localhost:18789 を実行</div></div>
      <div><FL>Gatewayトークン</FL><input type="password" value={token} onChange={e=>setToken(e.target.value)} placeholder="1d28d1a..." style={iSt}/></div>
      <button onClick={testConn} disabled={testing||!url||!token} style={{padding:"8px",border:"1px solid #00B8D444",borderRadius:"7px",background:"#00B8D415",color:"#00B8D4",fontSize:"11px",cursor:"pointer",fontFamily:"inherit",opacity:(!url||!token)?.5:1}}>{testing?"テスト中...":"⚡ 接続テスト"}</button>
      {result&&<div style={{padding:"8px 10px",borderRadius:"6px",background:result.ok?"#66BB6A15":"#FF525215",border:`1px solid ${result.ok?"#66BB6A":"#FF5252"}33`,fontSize:"11px",color:result.ok?"#66BB6A":"#FF5252"}}>{result.ok?"✅ Kai応答: "+result.msg:"❌ "+result.msg}</div>}
      <div style={{display:"flex",gap:"6px"}}>
        {connected&&<button onClick={onDisconnect} style={{padding:"9px 12px",border:"1px solid #FF525244",borderRadius:"7px",background:"transparent",color:"#FF5252",cursor:"pointer",fontSize:"11px",fontFamily:"inherit"}}>解除</button>}
        <button onClick={close} style={{flex:1,padding:"9px",border:"1px solid #1e1e3a",borderRadius:"7px",background:"transparent",color:"#888",cursor:"pointer",fontSize:"11px",fontFamily:"inherit"}}>閉じる</button>
        <button onClick={()=>{if(url&&token)onSave({url:url.replace(/\/$/,""),token})}} style={{flex:1,padding:"9px",border:"none",borderRadius:"7px",background:"linear-gradient(135deg,#00B8D4,#2EC4B6)",color:"#fff",cursor:"pointer",fontSize:"11px",fontWeight:600,fontFamily:"inherit",opacity:(!url||!token)?.5:1}}>保存</button>
      </div>
    </div>
  </MO>)}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
